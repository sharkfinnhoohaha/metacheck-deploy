name: Claude Code Review

# Automatically reviews every pull request (no @claude mention needed).
#
# SETUP (one-time, done by the repo owner):
#   1. Install the Claude GitHub App on this repo:
#        run `claude /install-github-app` in the Claude Code CLI, or install
#        manually at https://github.com/apps/claude
#   2. Add an `ANTHROPIC_API_KEY` secret to the repo
#        (Settings -> Secrets and variables -> Actions -> New repository secret).
# Until both are done, this workflow is a harmless no-op on PRs.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Skip cleanly if the API key secret isn't configured yet.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: "Review this PR for correctness bugs, security issues (auth/authorization, secrets, input validation, billing/webhook integrity), and obvious regressions. Be specific and post findings as inline comments. Skip nitpicks."
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 12 --model claude-sonnet-4-6"
